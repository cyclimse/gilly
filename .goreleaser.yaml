version: 2

project_name: gilly

builds:
  # Not doing GoReleaser's default build, since we don't have any Go code to build.
  - skip: true

checksum:
  name_template: "checksums.txt"

publishers:
  - name: Hex
    # use a custom publish command since goreleaser doesn't have built-in support for publishing to Hex.
    cmd: |
      echo 'I am not using semantic versioning' | gleam publish -y
    env:
      - HEXPM_API_KEY=${{ .Env.HEXPM_API_KEY }}

archives:
  - formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
