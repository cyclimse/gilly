name: test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1
        with:
          otp-version: "28"
          gleam-version: "1.15.2"
          rebar3-version: "3"

      - run: gleam deps download

      - run: gleam test

      - run: gleam format --check src test
  e2e:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: examples

    services:
      petstore:
        image: swaggerapi/petstore3:1.0.27
        ports:
          - 8080:8080

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1
        with:
          otp-version: "28"
          gleam-version: "1.15.2"
          rebar3-version: "3"

      - run: gleam deps download

      - run: gleam test
